<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настроение?</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: #333;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 60px;
            text-align: center;
        }

        .buttons {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 80px;
        }

        button {
            padding: 16px 50px;
            font-size: 1.5rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            transition: all 0.2s ease;
        }

        #yesBtn {
            background: #4ade80;
            color: white;
            position: absolute;
            left: 50px;
        }

        #yesBtn:hover {
            background: #22c55e;
            transform: scale(1.08);
        }

        #noBtn {
            background: #f87171;
            color: white;
            position: absolute;
            right: 50px;
        }

        #noBtn:hover {
            background: #ef4444;
        }

        #result {
            margin-top: 80px;
            font-size: 2.2rem;
            font-weight: bold;
            min-height: 90px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>У тебя настроение хорошее?</h1>

    <div class="buttons">
        <button id="yesBtn">Да</button>
        <button id="noBtn">Нет</button>
    </div>

    <div id="result"></div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const result = document.getElementById('result');

        // Функция убегания кнопки "Нет"
        function escapeNoButton() {
            const maxX = window.innerWidth - noBtn.offsetWidth - 100;
            const maxY = window.innerHeight - noBtn.offsetHeight - 150;

            const randomX = Math.random() * maxX;
            const randomY = 100 + Math.random() * (maxY - 100); // не слишком сверху

            noBtn.style.transition = 'left 0.4s ease, top 0.4s ease';
            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
        }

        // При нажатии на "Нет" — показываем, что ответ "Нет", и сразу убегаем
        noBtn.addEventListener('click', () => {
            // Можно добавить короткое сообщение, если хочешь
            // result.innerHTML = `<span style="color:#991b1b;">Ну ладно, бывает...</span>`;
            
            escapeNoButton();
        });

        // При нажатии на "Да"
        yesBtn.addEventListener('click', () => {
            result.innerHTML = `
                <span style="color:#166534;">Я рад, что у тебя хорошее настроение! 😊</span>
            `;
            
            yesBtn.disabled = true;
            noBtn.style.opacity = "0.4";
            noBtn.style.pointerEvents = "none"; // после выбора "Да" кнопка "Нет" становится неактивной
        });

        // Начальная позиция кнопки "Нет"
        window.addEventListener('load', () => {
            noBtn.style.position = 'absolute';
            escapeNoButton(); // сразу ставим в случайное место
        });

        // Если пользователь изменит размер окна
        window.addEventListener('resize', escapeNoButton);
    </script>

</body>
</html>
